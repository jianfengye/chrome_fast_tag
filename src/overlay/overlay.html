<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>书签搜索</title>
    <link rel="stylesheet" href="./overlay.css" />
  </head>
  <body>
    <div class="overlay">
      <div class="card">
        <input
          id="search-input"
          type="search"
          placeholder="搜索书签…"
          autocomplete="off"
          spellcheck="false"
        />
        <div id="status-line" class="status" hidden></div>
        <ul id="results" class="results"></ul>
        <div id="empty-state" class="empty" hidden>未找到书签</div>
        <footer class="footer">
          <span>↑↓ 选择</span>
          <span class="sep">·</span>
          <span>点击 / ↵ 打开</span>
          <span class="sep">·</span>
          <span>⌘/Ctrl+↵ 强制新开</span>
          <span class="sep">·</span>
          <span>Esc 关闭</span>
        </footer>
      </div>
    </div>
    <script type="module" src="./overlay.ts"></script>
  </body>
</html>
